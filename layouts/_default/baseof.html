<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ if .IsHome }}kullbach.net{{ else }}{{ .Title }} | kullbach.net{{ end }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page{{ if .IsHome }} page-wide{{ end }}">
    <header class="header">
      {{ if .IsHome }}<span class="site-name">{{ .Title }}</span>{{ else }}<a class="site-name" href="/">{{ .Title }}</a>{{ end }}
      {{ if .IsHome }}
      <nav class="menu">
        <a href="/contact">Contact</a>
        <a href="https://github.com/kullbachxyz" target="_blank" rel="noreferrer">GitHub</a>
        <a href="/index.xml" target="_blank" rel="noreferrer">RSS</a>
      </nav>
      {{ end }}
    </header>

    <main class="content">
      {{ block "main" . }}{{ end }}
    </main>

    {{ if not .IsHome }}
    <footer class="footer">
      <a href="/">← home</a>
    </footer>
    {{ end }}
  </div>
</body>
</html>
