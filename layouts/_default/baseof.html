<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/images/favicon.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      {{ if .IsHome }}<span class="site-name">{{ .Title }}</span>{{ else }}<span class="post-title">{{ .Title }}</span>{{ if not .Date.IsZero }}<span class="post-date header-date">{{ .Date.Format "2 Jan 2006" }}</span>{{ end }}{{ end }}
    </header>
    <hr class="divider">
    {{ if not .IsHome }}<a class="back-link" href="/">← back</a>{{ end }}

    <main class="content">
      {{ block "main" . }}{{ end }}
    </main>

    <hr class="divider">
    <footer class="footer">
      <nav class="menu">
        <a href="/contact">contact</a>
        <span class="menu-sep"></span>
        <a href="/key.pub">pgp</a>
        <span class="menu-sep"></span>
        <a href="https://github.com/kullbachxyz" target="_blank" rel="noreferrer">git</a>
        <span class="menu-sep"></span>
        <a href="/index.xml" target="_blank" rel="noreferrer">rss</a>
      </nav>
    </footer>
  </div>
</body>
</html>
