<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>kullbach.net — 404</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Hide the nav but keep its space so the page rhythm stays intact */
    #top-nav{visibility:hidden;}

    .not-found{
      border:1px solid var(--line);
      border-radius:10px;
      padding:1.5rem 1.6rem 1.6rem;
      background:linear-gradient(145deg, rgba(255,255,255,.03), rgba(0,0,0,.08));
      box-shadow:0 18px 55px rgba(0,0,0,.18);
    }

    .not-found .eyebrow{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:.95rem;
      margin:0 0 .35rem;
      display:block;
    }

    .not-found h1{
      margin:.1rem 0 .4rem;
      font-size:2.2rem;
    }

    .not-found p{
      margin:.65rem 0 1.15rem;
      color:var(--muted);
      max-width:46ch;
    }

    .not-found .actions{
      display:flex;
      gap:.75rem;
      flex-wrap:wrap;
    }
    .not-found .actions .key-link{
      background:#111;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <nav class="menu" id="top-nav" aria-hidden="true">
        <a href="/">Home</a>
        <a href="/tools">Tools</a>
        <a href="/projects">Projects</a>
        <a href="/contact">Contact</a>
        <a href="/index.xml" target="_blank" rel="noreferrer">RSS</a>
      </nav>
      <hr>
    </header>

    <main class="content">
      <section class="not-found">
        <span class="eyebrow">404</span>
        <h2>That page drifted off.</h2>
        <p>It looks like the link you followed doesn’t land anywhere here.</p>
        <div class="actions">
          <a class="key-link" href="/">Back to home</a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <hr>
      <a href="/">kullbach.net</a>
    </footer>
  </div>
</body>
</html>
